# ============================================================
# 楓之谷(楓星) 視覺掛機 設定檔
# 所有座標都是「遊戲視窗內」的相對座標 (左上角 = 0,0)
# 用 tools/calibrate.py 來量測你自己版本的座標
# ============================================================

window:
  # 遊戲視窗標題的關鍵字（部分符合即可），用 tools/calibrate.py --list-windows 查
  title_keyword: "MapleStory"
  # 視窗外框修正：pygetwindow 抓到的是含標題列的外框，
  # 這裡把標題列/邊框裁掉，只留遊戲畫面 (像素)
  crop: { top: 32, left: 8, right: 8, bottom: 8 }

# ---------- 小地圖（玩家定位） ----------
minimap:
  # 小地圖在遊戲視窗內的區域，用 calibrate.py 框選後填入
  region: { x: 10, y: 10, w: 180, h: 120 }
  # 玩家在小地圖上的點的顏色 (BGR) 與容差
  # 楓之谷 Worlds 系列玩家點通常是黃色，若不同用 calibrate.py --pick-color 量
  player_color_bgr: [0, 221, 255]
  player_color_tolerance: 40

# ---------- 巡邏路線 ----------
route:
  # 路線圖檔名（放在 assets/routes/，尺寸需與 minimap.region 的 w/h 一致）
  map: "example_map.png"
  # 在玩家點附近搜尋路線指令像素的半徑（小地圖像素）
  search_radius: 12
  # 路線圖顏色 → 動作 對照表 (BGR)，用小畫家以這些顏色在小地圖截圖上描路線
  colors:
    walk_left:   [0, 0, 255]     # 紅
    walk_right:  [255, 0, 0]     # 藍
    jump_left:   [0, 165, 255]   # 橘
    jump_right:  [255, 255, 0]   # 青 (cyan)
    jump:        [0, 255, 255]   # 黃（原地跳，例如跳上台階）
    climb_up:    [0, 255, 0]     # 綠（爬繩/梯子，按住上）
    climb_down:  [128, 0, 128]   # 紫（往下爬 / 下跳）
  color_tolerance: 30

# ---------- 怪物偵測 ----------
monster:
  # 使用 assets/monsters/<set> 資料夾內所有 png 當模板
  set: "example_map"
  # template matching 信心門檻 (0~1)，太多誤判就調高、抓不到就調低
  # （適用「遊戲截圖」模板）
  match_threshold: 0.72
  # 「去背圖」模板（tools/mob_downloader.py 下載的）用的門檻，
  # mask 比對的分數天生偏高，通常要 0.85~0.95
  masked_threshold: 0.90
  # 同時比對左右翻轉的模板（怪物會轉身）
  match_flipped: true
  # 效能：比對前先把畫面/模板縮小的倍率，0.5 = 計算量約 1/4
  # 弱電腦建議 0.5；若縮小後抓不到怪，調回 0.7 或 1.0 並降低 match_threshold
  downscale: 0.5
  # 偵測範圍：以畫面中心(角色)為中心的方框 (像素)，省 CPU 也避免打到太遠的怪
  detect_box: { w: 700, h: 360 }

# ---------- 攻擊 ----------
attack:
  key: "ctrl"          # 攻擊技能按鍵
  # 技能是否有方向性（要面向怪物才打得到）
  # true  = 出招前先輕點方向鍵轉身面向最近的怪
  # false = 以自己為中心的 AOE，原地放招
  directional: true
  # 轉身時方向鍵按住的秒數：太短轉不過去、太長會走動，0.06~0.12 之間微調
  turn_delay: 0.08
  # 怪物中心進入這個範圍（以角色為中心）就出招
  # x = 技能的水平攻擊距離（往一側），請依你技能實際射程調整
  range: { x: 280, y: 140 }
  cooldown: 0.6        # 連續施放的最小間隔（秒）
  # 額外 buff 技能：每隔 interval 秒按一次（不需要可留空 []）
  buffs: []
  # buffs 範例:
  # buffs:
  #   - { key: "pageup", interval: 95 }
  #   - { key: "pagedown", interval: 180 }

# ---------- 自動喝水 ----------
potion:
  hp:
    enabled: true
    key: "delete"
    threshold: 0.5     # 血量低於 50% 喝水
    # HP 條在視窗內的區域（用 calibrate.py 框選），偵測「有顏色的部分佔比」
    bar_region: { x: 400, y: 730, w: 180, h: 8 }
    # HP 條填充顏色 (BGR) 與容差
    fill_color_bgr: [60, 60, 230]
    fill_color_tolerance: 60
  mp:
    enabled: true
    key: "end"
    threshold: 0.3
    bar_region: { x: 600, y: 730, w: 180, h: 8 }
    fill_color_bgr: [230, 130, 60]
    fill_color_tolerance: 60
  cooldown: 1.0        # 喝水最小間隔（秒）

# ---------- 按鍵 ----------
keys:
  jump: "alt"
  up: "up"
  down: "down"
  left: "left"
  right: "right"

# ---------- 主迴圈 / 安全機制 ----------
runtime:
  fps: 10                  # 主迴圈頻率（弱電腦可降到 6~8）
  # 顯示偵測視覺化視窗。
  # 重要：關掉 (false) 會進入「效能模式」—— 不抓整張畫面，
  # 只抓偵測框/小地圖/血條幾個小區域，長時間掛機請關掉
  debug_window: true
  # 每 N 個迴圈才檢查一次血魔條（血量不會一瞬間掉光，不用每幀看）
  potion_check_every: 5
  hotkey_pause: "f8"       # 暫停/繼續
  hotkey_quit: "f12"       # 停止程式
  # 卡住偵測：玩家在小地圖上 N 秒沒移動就隨機跳一下試圖脫困
  stuck_seconds: 4.0
  # 動作持續時間（秒）：每個移動指令按住多久再重新判斷
  action_duration: 0.35
